<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Tapt Admin · Claims</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#F2A900;--malt:#1A1206;--foam:#FBF6EC;--hop:#3F8F5B;--copper:#B4531F;--slate:#6B6459}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--foam);color:var(--malt)}
.wrap{max-width:720px;margin:0 auto;padding:36px 20px 80px}
.brand{font-family:'Poppins';font-weight:800;font-size:1.3rem}.brand span{color:var(--gold)}
h1{font-family:'Poppins';font-size:1.6rem;margin:14px 0 18px}
input{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid rgba(26,18,6,.15);font-family:inherit;font-size:.98rem;margin-bottom:8px}
.btn{background:var(--gold);color:var(--malt);font-weight:700;border-radius:999px;padding:9px 18px;border:0;cursor:pointer;font-family:inherit}
.btn.g{background:var(--hop);color:#fff}.btn.r{background:transparent;border:2px solid rgba(180,83,31,.4);color:var(--copper)}
.claim{background:#fff;border:1px solid rgba(26,18,6,.08);border-radius:16px;padding:16px;margin-bottom:12px}
.claim.pending{border-left:4px solid var(--gold)}
.claim h3{font-family:'Poppins';font-size:1.05rem}
.meta{font-size:.85rem;color:var(--slate);margin:4px 0 10px}
.tag{font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:999px}
.tag.pending{background:#FFF3D6;color:var(--copper)}.tag.approved{background:#E1F2E7;color:var(--hop)}.tag.rejected{background:#F3E0DA;color:var(--copper)}
.msg{font-weight:600;font-size:.9rem;margin-top:8px}
.actions{display:flex;gap:8px;margin-top:8px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:18px}
.stat{background:#fff;border:1px solid rgba(26,18,6,.08);border-radius:14px;padding:14px;text-align:center}
.stat b{display:block;font-family:'Poppins';font-size:1.6rem;color:var(--malt)}
.stat.hot b{color:var(--copper)}
.stat span{font-size:.78rem;color:var(--slate)}
textarea:focus,input:focus{outline:none;border-color:var(--gold)}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">Tapt<span>.</span> <span style="font-size:.85rem;color:var(--slate);font-weight:600">admin</span></div>
  <h1>Venue claim queue</h1>

  <div id="authBox">
    <input type="email" id="email" placeholder="Admin email">
    <button class="btn" onclick="sendCode()">Email me a code</button>
    <div id="codeRow" hidden style="margin-top:8px">
      <input inputmode="numeric" id="code" placeholder="6-digit code">
      <button class="btn" onclick="verifyCode()">Verify</button>
    </div>
    <div class="msg" id="authMsg"></div>
  </div>

  <div id="stats" class="stats" hidden></div>

  <div id="dispatchBox" class="claim" hidden style="border-left:4px solid var(--copper)">
    <h3>Send The Tapt Dispatch</h3>
    <input id="dsubject" placeholder="Subject line" style="margin-top:8px">
    <textarea id="dbody" placeholder="Body (HTML ok). Keep it real, trends + one venue story + one Beer School bite." style="width:100%;min-height:90px;padding:12px;border-radius:12px;border:1.5px solid rgba(26,18,6,.15);font-family:inherit"></textarea>
    <button class="btn" onclick="sendDispatch()" style="margin-top:8px">Send to all subscribers</button>
    <div class="msg" id="dmsg"></div>
  </div>

  <h2 id="inqHead" style="font-family:Poppins;font-size:1.15rem;margin:20px 0 10px" hidden>Partner inquiries</h2>
  <div id="inquiries"></div>

  <h2 id="qHead" style="font-family:Poppins;font-size:1.15rem;margin:20px 0 10px" hidden>Venue claims</h2>
  <div id="queue"></div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const supa = createClient('https://qfwiizvqxrhjlthbjosz.supabase.co', 'sb_publishable_RdaJXK16LieKNlJZjJJ7tQ_5vF9YkhF');
const $ = id => document.getElementById(id);

window.sendCode = async () => {
  const { error } = await supa.auth.signInWithOtp({ email: $('email').value.trim() });
  $('authMsg').textContent = error ? error.message : 'Enter the code below.';
  if (!error) $('codeRow').hidden = false;
};
window.verifyCode = async () => {
  const { error } = await supa.auth.verifyOtp({ email: $('email').value.trim(), token: $('code').value.trim(), type: 'email' });
  $('authMsg').textContent = error ? 'Code failed.' : '';
  if (!error) load();
};

const FN = 'https://qfwiizvqxrhjlthbjosz.supabase.co/functions/v1/resend-send';
async function callFn(payload) {
  const { data: { session } } = await supa.auth.getSession();
  const r = await fetch(FN, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` }, body: JSON.stringify(payload) });
  return r.json();
}

async function load() {
  const { data: isAdmin } = await supa.rpc('is_admin');
  if (!isAdmin) { $('queue').innerHTML = '<p style="color:var(--copper)">This account is not an admin.</p>'; return; }
  $('authBox').style.display = 'none';
  $('stats').hidden = false; $('dispatchBox').hidden = false; $('qHead').hidden = false; $('inqHead').hidden = false;

  // Ops dashboard
  const { data: s } = await supa.rpc('admin_stats');
  if (s) $('stats').innerHTML = [
    ['users','Drinkers',false],['venues_claimed','Venues claimed',false],['claims_pending','Claims pending',true],
    ['menus_live','Live menus',false],['pours','Pours logged',false],['votes','Votes',false],
    ['subscribers','Dispatch subs',false],['inquiries_new','New inquiries',true],['beers','Beers',false]
  ].map(([k,l,hot]) => `<div class="stat ${hot&&s[k]>0?'hot':''}"><b>${s[k]??0}</b><span>${l}</span></div>`).join('');

  // Inquiries
  const { data: inq } = await supa.rpc('admin_inquiries');
  $('inquiries').innerHTML = (inq && inq.length) ? inq.map(i => `
    <div class="claim ${i.status==='new'?'pending':''}">
      <div style="display:flex;justify-content:space-between"><h3>${esc(i.business_name)}</h3><span class="tag ${i.status==='new'?'pending':'approved'}">${i.status}</span></div>
      <div class="meta">${esc(i.business_kind)} · ${esc(i.contact_email)} · ${[i.city,i.region,i.country].filter(Boolean).map(esc).join(', ')}</div>
      ${i.message?`<div style="font-size:.9rem">${esc(i.message)}</div>`:''}
    </div>`).join('') : '<p style="color:var(--slate)">No inquiries yet.</p>';

  const { data: claims } = await supa.rpc('admin_claims');
  const q = $('queue'); q.innerHTML = '';
  if (!claims || !claims.length) { q.innerHTML = '<p style="color:var(--slate)">No claims yet.</p>'; return; }
  claims.forEach(c => {
    const div = document.createElement('div');
    div.className = 'claim ' + c.status;
    const place = [c.city, c.region].filter(Boolean).map(esc).join(', ');
    div.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center">
      <h3>${esc(c.venue_name)}</h3><span class="tag ${c.status}">${c.status}</span></div>
      <div class="meta">${place} · ${esc(c.business_email)} · role: ${esc(c.claimant_role||'—')}</div>`;
    if (c.status === 'pending') {
      const actions = document.createElement('div'); actions.className = 'actions';
      const ap = document.createElement('button'); ap.className = 'btn g'; ap.textContent = 'Approve';
      ap.onclick = () => setStatus(c.claim_id, 'approved', c.venue_id);
      const rj = document.createElement('button'); rj.className = 'btn r'; rj.textContent = 'Reject';
      rj.onclick = () => setStatus(c.claim_id, 'rejected');
      actions.append(ap, rj); div.appendChild(actions);
    }
    q.appendChild(div);
  });
}

async function setStatus(id, status, venueId) {
  const { error } = await supa.rpc('set_claim_status', { p_claim: id, p_status: status });
  if (error) { alert(error.message); return; }
  if (status === 'approved' && venueId) {
    // Fire the welcome + QR email (no-ops silently if Resend isn't configured yet).
    callFn({ kind: 'partner_welcome', venue_id: venueId }).catch(() => {});
  }
  load();
}

window.sendDispatch = async () => {
  const subject = $('dsubject').value.trim(), html = $('dbody').value.trim();
  if (!subject || !html) { $('dmsg').textContent = 'Add a subject and body.'; return; }
  $('dmsg').textContent = 'Sending...';
  const res = await callFn({ kind: 'dispatch', subject, html });
  $('dmsg').textContent = res.sent ? `Sent to ${res.delivered}/${res.total} subscribers. 🍻`
    : (res.reason || res.error || 'Not sent, is RESEND_API_KEY set?');
};

function esc(s){ return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
supa.auth.getSession().then(({ data }) => { if (data.session) load(); });
</script>
</body>
</html>
