<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tap List — Tapt</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#F2A900;--malt:#1A1206;--foam:#FBF6EC;--copper:#B4531F;--slate:#6B6459}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--foam);color:var(--malt)}
.wrap{max-width:640px;margin:0 auto;padding:40px 20px 80px}
.brand{font-family:'Poppins';font-weight:800;font-size:1.2rem}.brand span{color:var(--gold)}
h1{font-family:'Poppins';font-size:2rem;letter-spacing:-.02em;margin:18px 0 2px}
.sub{color:var(--slate);font-size:.95rem;margin-bottom:24px}
.tap{display:flex;justify-content:space-between;gap:12px;background:#fff;border:1px solid rgba(26,18,6,.08);border-radius:16px;padding:16px 18px;margin-bottom:10px}
.tap b{font-size:1.05rem}.tap .meta{color:var(--slate);font-size:.85rem;margin-top:2px}
.price{font-family:'Poppins';font-weight:800;color:var(--copper);white-space:nowrap}
.empty{background:#fff;border-radius:16px;padding:28px;text-align:center;color:var(--slate)}
.qrbox{margin-top:34px;text-align:center;background:var(--malt);color:var(--foam);border-radius:20px;padding:26px}
.qrbox img{background:#fff;padding:10px;border-radius:12px;margin:12px 0}
.btn{display:inline-block;background:var(--gold);color:var(--malt);font-weight:700;border-radius:999px;padding:10px 22px;text-decoration:none;margin-top:8px;cursor:pointer;border:0;font-size:.95rem}
.foot{margin-top:30px;font-size:.78rem;color:var(--slate);text-align:center}
.updated{font-size:.78rem;color:var(--slate);margin-bottom:16px}
@media print{.qrbox,.foot .cta{display:none}}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">Tapt<span>.</span> <span style="font-size:.8rem;color:var(--slate);font-weight:600">· live tap list</span></div>
  <h1 id="venue">Loading…</h1>
  <div class="sub" id="place"></div>
  <div class="updated" id="updated"></div>
  <div id="taps"></div>
  <div class="qrbox" id="qrbox" hidden>
    <div style="font-family:'Poppins';font-weight:800">Scan for the live menu</div>
    <img id="qr" width="180" height="180" alt="QR code to this menu">
    <div><button class="btn" onclick="window.print()">Print this menu + QR</button></div>
    <div style="font-size:.78rem;opacity:.7;margin-top:10px">Free forever, hosted by Tapt — THE Beer Superapp</div>
  </div>
  <div class="foot">Menus are published by the venue via Tapt. Enjoy responsibly — 21+/legal drinking age. <span class="cta"><a href="index.html" style="color:var(--copper)">What is Tapt?</a></span></div>
</div>
<script>
const v = new URLSearchParams(location.search).get('v');
const el = id => document.getElementById(id);
async function load(){
  if(!v){ el('venue').textContent = 'No venue specified'; return; }
  try{
    const r = await fetch('https://qfwiizvqxrhjlthbjosz.supabase.co/rest/v1/rpc/venue_menu',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':'sb_publishable_RdaJXK16LieKNlJZjJJ7tQ_5vF9YkhF'},
      body: JSON.stringify({p_venue: v})
    });
    const rows = await r.json();
    if(!Array.isArray(rows) || rows.length === 0){
      el('venue').textContent = 'Tap list coming soon';
      el('taps').innerHTML = '<div class="empty">This venue hasn\'t published a current tap list yet. Ask them to claim their free Tapt profile! 🍺</div>';
      return;
    }
    el('venue').textContent = rows[0].venue_name;
    el('place').textContent = [rows[0].city, rows[0].region, rows[0].country].filter(Boolean).join(', ');
    el('updated').textContent = 'Updated ' + new Date(rows[0].updated_at).toLocaleDateString();
    el('taps').innerHTML = rows.map(t => `
      <div class="tap"><div><b>${esc(t.beer_name)}</b>
      <div class="meta">${[t.brewery_name, t.style].filter(Boolean).map(esc).join(' · ')}</div></div>
      ${t.price_text ? `<div class="price">${esc(t.price_text)}</div>` : ''}</div>`).join('');
    el('qr').src = 'https://api.qrserver.com/v1/create-qr-code/?size=360x360&data=' + encodeURIComponent(location.href);
    el('qrbox').hidden = false;
  }catch(e){
    el('venue').textContent = 'Menu unavailable';
    el('taps').innerHTML = '<div class="empty">Could not load this menu right now.</div>';
  }
}
function esc(s){ return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
load();
</script>
</body>
</html>
