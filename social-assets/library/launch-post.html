<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--gold:#F2A900;--malt:#1A1206;--foam:#FBF6EC;--hop:#3F8F5B;--copper:#B4531F;--muted:#B89A73;--haze:#EFE3CC}
  *{box-sizing:border-box} html,body{margin:0;background:#0C0702}
  .slide{width:1080px;height:1350px;position:relative;overflow:hidden;color:var(--foam);font-family:'Inter',sans-serif;
    padding:90px;background:radial-gradient(130% 90% at 50% 4%, #2E1D0A 0%, #1A1206 44%, #0C0702 100%)}
  .brow{display:flex;align-items:center;gap:16px}
  .brow .m{width:48px;height:48px}.brow .wm{font-family:'Poppins';font-weight:800;font-size:31px;letter-spacing:.04em}
  .brow .h{margin-left:auto;font-weight:600;font-size:25px;color:#C89A5A}
  .mark{width:196px;height:196px;margin:118px auto 0;display:block;filter:drop-shadow(0 24px 60px rgba(242,169,0,.28))}
  .kick{text-align:center;font-family:'Poppins';font-weight:700;font-size:28px;letter-spacing:.26em;color:var(--gold);margin-top:54px}
  h1{text-align:center;font-family:'Poppins';font-weight:900;font-size:128px;line-height:.94;letter-spacing:-.03em;margin:24px 0 0}
  h1 .g{color:var(--gold)}
  .tag{text-align:center;font-family:'Poppins';font-weight:600;font-size:44px;color:var(--haze);margin-top:30px}
  .pill{display:block;width:max-content;margin:52px auto 0;font-family:'Poppins';font-weight:700;font-size:40px;color:var(--malt);background:var(--gold);padding:24px 58px;border-radius:999px}
  .foot{position:absolute;left:90px;right:90px;bottom:80px;display:flex;align-items:center}
  .foot .src{font-size:27px;color:var(--muted)}
  .foot .s{margin-left:auto;font-family:'Poppins';font-weight:600;font-size:29px;color:#C89A5A}
</style></head><body>
