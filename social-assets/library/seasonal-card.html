<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--gold:#F2A900;--malt:#1A1206;--foam:#FBF6EC;--hop:#3F8F5B;--copper:#B4531F;--muted:#B89A73;--haze:#EFE3CC}
  *{box-sizing:border-box} html,body{margin:0;background:#0C0702}
  .slide{width:1080px;height:1350px;position:relative;overflow:hidden;color:var(--foam);font-family:'Inter',sans-serif;
    padding:90px;background:radial-gradient(120% 80% at 50% 20%, #33240D 0%, #1D1408 46%, #0C0702 100%)}
  .brow{display:flex;align-items:center;gap:16px}
  .brow .m{width:46px;height:46px}.brow .wm{font-family:'Poppins';font-weight:800;font-size:30px;letter-spacing:.04em}
  .brow .h{margin-left:auto;font-weight:600;font-size:24px;color:#C89A5A}
  .sun{position:absolute;right:120px;top:150px;width:150px;height:150px;color:var(--gold);opacity:.9}
  .eyebrow{margin-top:56px;font-family:'Poppins';font-weight:700;font-size:28px;letter-spacing:.2em;color:var(--gold)}
  h1{font-family:'Poppins';font-weight:800;font-size:104px;line-height:1.0;margin:18px 0 0;letter-spacing:-.02em}
  h1 .g{color:var(--gold)}
  .glasses{margin-top:80px;display:flex;justify-content:space-between;gap:20px}
  .col{flex:1;text-align:center}
  .col svg{width:100%;max-width:230px;height:auto;filter:drop-shadow(0 24px 44px rgba(0,0,0,.5))}
  .col b{display:block;font-family:'Poppins';font-weight:700;font-size:38px;margin-top:26px}
  .col span{display:block;font-size:26px;color:var(--muted);margin-top:8px}
  .foot{position:absolute;left:90px;right:90px;bottom:80px;display:flex;align-items:center}
  .foot .src{font-size:26px;color:var(--muted)}
  .foot .s{margin-left:auto;font-family:'Poppins';font-weight:600;font-size:28px;color:#C89A5A}
</style></head><body>

  <linearGradient id="f" x1="200" y1="62" x2="200" y2="155" gradientUnits="userSpaceOnUse"><stop stop-color="#fff"/><stop offset="1" stop-color="#F3E7CC"/></linearGradient>

</div>
</body></html>
