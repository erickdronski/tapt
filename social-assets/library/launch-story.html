<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--gold:#F2A900;--malt:#1A1206;--foam:#FBF6EC;--hop:#3F8F5B;--copper:#B4531F;--muted:#B89A73;--haze:#EFE3CC}
  *{box-sizing:border-box} html,body{margin:0;background:#0C0702}
  .frame{width:1080px;height:1920px;position:relative;overflow:hidden;color:var(--foam);font-family:'Inter',sans-serif;
    padding:120px 90px;background:radial-gradient(120% 60% at 50% 14%, #2E1D0A 0%, #1A1206 46%, #0C0702 100%)}
  .brow{display:flex;align-items:center;justify-content:center;gap:16px}
  .brow .m{width:48px;height:48px}.brow .wm{font-family:'Poppins';font-weight:800;font-size:33px;letter-spacing:.05em}
  .brow .h{font-weight:600;font-size:29px;color:#C89A5A}
  .mark{width:250px;height:250px;margin:140px auto 0;display:block;filter:drop-shadow(0 30px 70px rgba(242,169,0,.3))}
  .kick{text-align:center;font-family:'Poppins';font-weight:700;font-size:32px;letter-spacing:.28em;color:var(--gold);margin-top:70px}
  h1{text-align:center;font-family:'Poppins';font-weight:900;font-size:150px;line-height:.92;letter-spacing:-.03em;margin:28px 0 0}
  h1 .g{color:var(--gold)}
  .tag{text-align:center;font-family:'Poppins';font-weight:600;font-size:52px;color:var(--haze);margin-top:40px}
  .board{margin:96px auto 0;width:760px;background:var(--malt);border-radius:28px;padding:26px 26px 20px;box-shadow:0 30px 80px rgba(0,0,0,.5);border:1px solid rgba(242,169,0,.14)}
  .board h4{font-family:'Poppins';font-weight:700;font-size:26px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin:2px 0 18px}
  .row{display:flex;align-items:center;gap:18px;padding:14px 16px;border-radius:14px;background:rgba(251,246,236,.05);margin-bottom:12px}
  .row .rank{font-family:'Poppins';font-weight:800;color:var(--gold);width:22px;font-size:30px}
  .row .gm{width:44px;height:44px;flex:none;display:flex;align-items:center;justify-content:center;background:rgba(251,246,236,.05);border-radius:12px}
  .row .gm svg{width:26px;height:34px;display:block}
  .row .nm{flex:1;min-width:0}
  .row .nm b{display:block;font-family:'Poppins';font-weight:600;font-size:30px}
  .row .nm span{font-size:22px;color:rgba(251,246,236,.55)}
  .row .mv{font-family:'Poppins';font-weight:800;font-size:34px}
  .up{color:#7FD49B}.down{color:#E88C6A}
  .foot{position:absolute;left:0;right:0;bottom:120px;text-align:center}
  .foot .pill{display:inline-block;font-family:'Poppins';font-weight:700;font-size:40px;color:var(--malt);background:var(--gold);padding:24px 60px;border-radius:999px}
  .foot .s{display:block;margin-top:26px;font-size:28px;color:var(--muted)}
</style></head><body>

  <linearGradient id="f" x1="200" y1="62" x2="200" y2="155" gradientUnits="userSpaceOnUse"><stop stop-color="#fff"/><stop offset="1" stop-color="#F3E7CC"/></linearGradient>

    <div class="row"><span class="rank">3</span><span class="gm"><svg viewBox="0 0 20 27"><path d="M4 7 L16 7 L14.7 22.6 Q14.5 24.2 13 24.2 L7 24.2 Q5.5 24.2 5.3 22.6 Z" fill="#3A2414"/><ellipse cx="10" cy="6.6" rx="6.6" ry="2.5" fill="#EFE6D2"/></svg></span><div class="nm"><b>Guinness Draught</b><span>Irish Stout · Ireland</span></div><span class="mv down">&#9660;</span></div>
  </div>
  <div class="foot"><span class="pill">taptbeer.com</span><span class="s">Boards fill in from real votes. Tap to start.</span></div>
</div>
</body></html>
