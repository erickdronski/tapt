<style>
  :root{--gold:#F2A900;--malt:#1A1206;--foam:#FBF6EC;--hop:#3F8F5B;--copper:#B4531F;--muted:#B89A73;--haze:#EFE3CC}
  *{box-sizing:border-box} html,body{margin:0;background:#0C0702}
  .slide{width:1080px;height:1350px;position:relative;overflow:hidden;color:var(--foam);font-family:'Inter',sans-serif;
    padding:90px;background:radial-gradient(120% 80% at 50% 26%, #33240D 0%, #1D1408 46%, #0C0702 100%)}
  .brow{display:flex;align-items:center;gap:16px}
  .brow .m{width:46px;height:46px}.brow .wm{font-family:'Poppins';font-weight:800;font-size:30px;letter-spacing:.04em}
  .brow .h{margin-left:auto;font-weight:600;font-size:24px;color:#C89A5A}
  .crown{width:150px;height:150px;margin:52px auto 0;display:block;color:var(--gold)}
  .eyebrow{text-align:center;margin-top:24px;font-family:'Poppins';font-weight:700;font-size:30px;letter-spacing:.24em;color:var(--gold)}
  .glass{width:300px;height:auto;margin:26px auto 0;display:block;filter:drop-shadow(0 30px 60px rgba(0,0,0,.5))}
  .name{text-align:center;font-family:'Poppins';font-weight:800;font-size:82px;line-height:1.02;letter-spacing:-.02em;margin:34px 0 0}
  .tag{text-align:center;font-family:'Poppins';font-weight:600;font-size:36px;color:var(--haze);margin-top:16px}
  .foot{position:absolute;left:90px;right:90px;bottom:80px;display:flex;align-items:center}
  .foot .src{font-size:25px;color:var(--muted);max-width:720px;line-height:1.4}
  .foot .s{margin-left:auto;font-family:'Poppins';font-weight:600;font-size:28px;color:#C89A5A}
</style></head><body>
