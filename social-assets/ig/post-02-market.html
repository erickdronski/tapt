<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0}
  .frame{width:1080px;height:1350px;position:relative;overflow:hidden;box-sizing:border-box;padding:90px;color:#FBF6EC;font-family:'Inter',sans-serif;
    background:radial-gradient(130% 90% at 50% 8%, #2A1B0A 0%, #1A1206 46%, #0C0702 100%);}
  .brandrow{display:flex;align-items:center;gap:18px}
  .brandrow .mark{width:48px;height:48px}.brandrow .wm{font-family:'Poppins';font-weight:800;font-size:31px;letter-spacing:.04em}
  .brandrow .h{margin-left:auto;font-weight:600;font-size:25px;color:#C89A5A}
  .eyebrow{margin-top:60px;font-family:'Poppins';font-weight:700;font-size:30px;letter-spacing:.2em;color:#F2A900}
  h1{font-family:'Poppins';font-weight:800;font-size:96px;line-height:1.02;margin:20px 0 0;letter-spacing:-.02em}
  h1 .g{color:#F2A900}
  .chart{margin-top:48px;width:100%;height:300px}
  .chips{margin-top:48px;display:flex;flex-direction:column;gap:22px}
  .chip{display:flex;align-items:center;gap:22px;font-family:'Poppins';font-weight:600;font-size:42px;
    padding:24px 32px;border-radius:22px;background:rgba(251,246,236,.05);border:1px solid rgba(251,246,236,.08)}
  .chip .ar{font-size:44px;font-weight:800}
  .up .ar{color:#57BE77}.down .ar{color:#E37F2C}
  .kicker{margin-top:44px;font-size:42px;color:#F1E4CB;font-weight:500}
  .kicker b{color:#F2A900;font-weight:700}
  .foot{position:absolute;left:90px;right:90px;bottom:76px;display:flex;align-items:center}
  .src{font-size:28px;color:#B89A73;font-weight:500}.site{margin-left:auto;font-family:'Poppins';font-weight:600;font-size:29px;color:#C89A5A}
</style></head><body>
  <div class="frame">
    <div class="brandrow">
      <svg class="mark" viewBox="0 0 400 520" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="b" x1="200" y1="150" x2="200" y2="475" gradientUnits="userSpaceOnUse"><stop stop-color="#FFD24D"/><stop offset=".45" stop-color="#F2A900"/><stop offset="1" stop-color="#C56B10"/></linearGradient>
        <linearGradient id="f" x1="200" y1="62" x2="200" y2="155" gradientUnits="userSpaceOnUse"><stop stop-color="#fff"/><stop offset="1" stop-color="#F3E7CC"/></linearGradient>
        <clipPath id="c"><path d="M95 150 Q104 310 117 464 Q120 475 131 475 L269 475 Q280 475 283 464 Q296 310 305 150 Z"/></clipPath></defs>
        <g clip-path="url(#c)"><rect x="80" y="140" width="245" height="345" fill="url(#b)"/></g>
        <path d="M88 152 C78 118 96 96 120 92 C118 74 150 66 176 76 C190 60 220 62 234 78 C258 66 288 76 300 98 C318 100 316 128 312 152 C260 158 140 158 88 152 Z" fill="url(#f)" stroke="#130A02" stroke-width="16" stroke-linejoin="round"/>
        <path d="M95 150 Q104 310 117 464 Q120 475 131 475 L269 475 Q280 475 283 464 Q296 310 305 150" fill="none" stroke="#130A02" stroke-width="18" stroke-linejoin="round"/>
      </svg>
      <span class="wm">TAPT</span><span class="h">@taptbeerapp</span>
    </div>
    <div class="eyebrow">THE BEER MARKET</div>
    <h1>A stock market<br>for <span class="g">beer</span>.</h1>

    <svg class="chart" viewBox="0 0 900 300" preserveAspectRatio="none">
      <defs><linearGradient id="area" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F2A900" stop-opacity=".34"/><stop offset="1" stop-color="#F2A900" stop-opacity="0"/></linearGradient></defs>
      <path d="M0 250 L150 220 L300 235 L450 160 L600 120 L750 60 L900 20 L900 300 L0 300 Z" fill="url(#area)"/>
      <path d="M0 250 L150 220 L300 235 L450 160 L600 120 L750 60 L900 20" fill="none" stroke="#F2A900" stroke-width="8" stroke-linjoin="round" stroke-linecap="round"/>
      <circle cx="900" cy="20" r="13" fill="#F2A900"/>
    </svg>

    <div class="chips">
      <div class="chip up"><span class="ar">&#9650;</span> Vote it up, it climbs.</div>
      <div class="chip down"><span class="ar">&#9660;</span> Vote it down, it slides.</div>
    </div>
    <div class="kicker">Moved by <b>real votes</b>, not dollars.</div>

    <div class="foot"><span class="src">No prices. Just what people actually drink.</span><span class="site">taptbeer.com</span></div>
  </div>
</body></html>
