<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html,body{margin:0}
  .frame{width:1080px;height:1920px;position:relative;overflow:hidden;font-family:'Inter',sans-serif;color:#FBF6EC;background:#0C0702}
  .half{position:absolute;left:0;right:0;height:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .top{top:0;background:radial-gradient(120% 120% at 50% 30%, #1C3A24 0%, #123019 55%, #0C1C0F 100%)}
  .bot{bottom:0;background:radial-gradient(120% 120% at 50% 70%, #2A1608 0%, #1A0E04 55%, #0C0702 100%)}
  .lab{font-family:'Poppins';font-weight:900;font-size:196px;line-height:1;letter-spacing:-.02em}
  .top .lab{color:#8FE0A8;text-shadow:0 0 60px rgba(87,190,119,.4)}
  .bot .lab{color:#F2A900;text-shadow:0 0 60px rgba(242,169,0,.35)}
  .notes{margin-top:26px;font-family:'Poppins';font-weight:600;font-size:44px;letter-spacing:.04em}
  .top .notes{color:#B7E7C6}.bot .notes{color:#E7C08A}
  .vs{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:3;
    width:180px;height:180px;border-radius:50%;background:#0C0702;border:6px solid #F2A900;
    display:flex;align-items:center;justify-content:center;font-family:'Poppins';font-weight:800;font-size:74px;color:#F2A900;
    box-shadow:0 0 60px rgba(242,169,0,.5)}
  .brandrow{position:absolute;top:90px;left:0;right:0;z-index:4;display:flex;align-items:center;justify-content:center;gap:16px}
  .brandrow .mark{width:46px;height:46px}.brandrow .wm{font-family:'Poppins';font-weight:800;font-size:34px;letter-spacing:.05em}
  .brandrow .h{font-weight:600;font-size:30px;color:#C89A5A}
  .prompt{position:absolute;bottom:120px;left:0;right:0;z-index:4;text-align:center;font-family:'Poppins';font-weight:700;font-size:52px;color:#FBF6EC}
  .prompt small{display:block;margin-top:12px;font-weight:500;font-size:32px;color:#C7B79A;font-family:'Inter'}
</style></head><body>
  <div class="frame">
    <div class="half top"><div class="lab">IPA</div><div class="notes">hoppy · citrus · pine</div></div>
    <div class="half bot"><div class="lab">STOUT</div><div class="notes">roasty · coffee · dry</div></div>
    <div class="vs">VS</div>
    <div class="brandrow">
      <svg class="mark" viewBox="0 0 400 520" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="b" x1="200" y1="150" x2="200" y2="475" gradientUnits="userSpaceOnUse"><stop stop-color="#FFD24D"/><stop offset=".45" stop-color="#F2A900"/><stop offset="1" stop-color="#C56B10"/></linearGradient>
        <linearGradient id="f" x1="200" y1="62" x2="200" y2="155" gradientUnits="userSpaceOnUse"><stop stop-color="#fff"/><stop offset="1" stop-color="#F3E7CC"/></linearGradient>
        <clipPath id="c"><path d="M95 150 Q104 310 117 464 Q120 475 131 475 L269 475 Q280 475 283 464 Q296 310 305 150 Z"/></clipPath></defs>
        <g clip-path="url(#c)"><rect x="80" y="140" width="245" height="345" fill="url(#b)"/></g>
        <path d="M88 152 C78 118 96 96 120 92 C118 74 150 66 176 76 C190 60 220 62 234 78 C258 66 288 76 300 98 C318 100 316 128 312 152 C260 158 140 158 88 152 Z" fill="url(#f)" stroke="#130A02" stroke-width="16" stroke-linejoin="round"/>
        <path d="M95 150 Q104 310 117 464 Q120 475 131 475 L269 475 Q280 475 283 464 Q296 310 305 150" fill="none" stroke="#130A02" stroke-width="18" stroke-linejoin="round"/>
      </svg>
      <span class="wm">TAPT</span><span class="h">@taptbeer</span>
    </div>
    <div class="prompt">Which one wins?<small>drop your vote 👇 · settle it in Tapt</small></div>
  </div>
</body></html>
