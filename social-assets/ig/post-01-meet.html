<!doctype html><html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0}
  .frame{width:1080px;height:1350px;position:relative;overflow:hidden;box-sizing:border-box;
    padding:96px 90px;color:#FBF6EC;font-family:'Inter',sans-serif;
    background:radial-gradient(130% 90% at 50% 8%, #2A1B0A 0%, #1A1206 46%, #0C0702 100%);}
  .brandrow{display:flex;align-items:center;gap:18px}
  .brandrow .mark{width:52px;height:52px}
  .brandrow .wm{font-family:'Poppins';font-weight:800;font-size:34px;letter-spacing:.04em;color:#FBF6EC}
  .brandrow .h{margin-left:auto;font-weight:600;font-size:26px;color:#C89A5A}
  h1{font-family:'Poppins';font-weight:800;font-size:118px;line-height:1.02;margin:150px 0 0;letter-spacing:-.02em}
  h1 .g{color:#F2A900}
  .lines{margin-top:70px;display:flex;flex-direction:column;gap:34px}
  .line{display:flex;align-items:flex-start;gap:26px;font-family:'Poppins';font-weight:600;font-size:50px;line-height:1.14}
  .dot{width:20px;height:20px;border-radius:50%;background:#F2A900;flex:none;margin-top:16px;box-shadow:0 0 24px rgba(242,169,0,.6)}
  .line .t{max-width:820px}
  .line b{color:#F2A900;font-weight:700}
  .foot{position:absolute;left:90px;right:90px;bottom:100px;display:flex;align-items:center}
  .cta{font-family:'Poppins';font-weight:700;font-size:40px;color:#1A1206;background:#F2A900;padding:22px 46px;border-radius:999px}
</style></head><body>
  <div class="frame">
    <div class="brandrow">
      <svg class="mark" viewBox="0 0 400 520" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="b" x1="200" y1="150" x2="200" y2="475" gradientUnits="userSpaceOnUse"><stop stop-color="#FFD24D"/><stop offset=".45" stop-color="#F2A900"/><stop offset="1" stop-color="#C56B10"/></linearGradient>
        <linearGradient id="f" x1="200" y1="62" x2="200" y2="155" gradientUnits="userSpaceOnUse"><stop stop-color="#fff"/><stop offset="1" stop-color="#F3E7CC"/></linearGradient>
        <clipPath id="c"><path d="M95 150 Q104 310 117 464 Q120 475 131 475 L269 475 Q280 475 283 464 Q296 310 305 150 Z"/></clipPath></defs>
        <g clip-path="url(#c)"><rect x="80" y="140" width="245" height="345" fill="url(#b)"/></g>
        <path d="M88 152 C78 118 96 96 120 92 C118 74 150 66 176 76 C190 60 220 62 234 78 C258 66 288 76 300 98 C318 100 316 128 312 152 C260 158 140 158 88 152 Z" fill="url(#f)" stroke="#130A02" stroke-width="16" stroke-linejoin="round"/>
        <path d="M95 150 Q104 310 117 464 Q120 475 131 475 L269 475 Q280 475 283 464 Q296 310 305 150" fill="none" stroke="#130A02" stroke-width="18" stroke-linejoin="round"/>
      </svg>
      <span class="wm">TAPT</span>
      <span class="h">@taptbeerapp</span>
    </div>

    <h1>The beer<br>superapp.</h1>

    <div class="lines">
      <div class="line"><span class="dot"></span><span class="t">Rate it.</span></div>
      <div class="line"><span class="dot"></span><span class="t">Cellar it.</span></div>
      <div class="line"><span class="dot"></span><span class="t">Watch it climb the <b>Beer&nbsp;Market</b>.</span></div>
    </div>

    <div class="foot">
      <span class="cta">taptbeer.com</span>
    </div>
  </div>
</body></html>
