name: ASC Admin

# TestFlight metadata admin (beta description, feedback flags, whatsNew).
# Runs where the ASC API key lives (repo secrets). Manual dispatch only.
on:
  workflow_dispatch:
  # Auto-run after every TestFlight upload: waits out ASC processing, then
  # answers export compliance + assigns the new build to all tester groups.
  workflow_run:
    workflows: ["TestFlight"]
    types: [completed]

jobs:
  asc-admin:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # API job + optional 10-min ASC processing wait
    steps:
      - uses: actions/checkout@v4

      - name: Wait for ASC processing (only after uploads)
        if: github.event_name == 'workflow_run'
        run: sleep 600

      - name: Write ASC API key
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.ASC_KEY_P8 }}" | base64 --decode > ~/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - name: Install deps
        run: pip install pyjwt cryptography

      - name: Run TestFlight admin
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_PATH: /home/runner/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
        run: python scripts/asc_testflight_admin.py
