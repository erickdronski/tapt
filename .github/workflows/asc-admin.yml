name: ASC Admin

# TestFlight metadata admin for one exact build number.
on:
  workflow_call:
    inputs:
      build_number:
        description: Exact CFBundleVersion uploaded by the caller
        required: true
        type: string
      wait_for_processing:
        description: Wait for App Store Connect to index a newly uploaded build
        required: false
        type: boolean
        default: false
    secrets:
      ASC_KEY_P8:
        required: true
      ASC_KEY_ID:
        required: true
      ASC_ISSUER_ID:
        required: true
  workflow_dispatch:
    inputs:
      build_number:
        description: Exact processed TestFlight build number to administer
        required: true
        type: string
      wait_for_processing:
        description: Wait before looking up the requested build
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  asc-admin:
    runs-on: ubuntu-latest
    environment: testflight
    timeout-minutes: 15 # API job + optional 10-min ASC processing wait
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Wait for ASC processing (only after uploads)
        if: inputs.wait_for_processing
        run: sleep 600

      - name: Write ASC API key
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.ASC_KEY_P8 }}" | base64 --decode > ~/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - name: Install deps
        run: pip install pyjwt cryptography

      - name: Run TestFlight admin
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_PATH: /home/runner/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
          TARGET_BUILD_NUMBER: ${{ inputs.build_number }}
        run: python scripts/asc_testflight_admin.py
