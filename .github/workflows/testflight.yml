name: TestFlight

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    # Archives have taken ~40 min; macOS bills 10x, so an uncapped hang would
    # bill the 360-min default (~3,600 min). 75 keeps headroom.
    timeout-minutes: 75
    env:
      PROFILE_NAME: "Tapt App Store CI"
      BUNDLE_ID: app.tapt.tapt
    outputs:
      uploaded: ${{ steps.upload.outputs.uploaded }}
      build_number: ${{ github.run_number }}
    steps:
      - name: Verify release branch
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error title=Wrong release branch::TestFlight uploads must run from main."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          ls -d /Applications/Xcode_*.app 2>/dev/null || true
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST" ]; then sudo xcode-select -s "$LATEST/Contents/Developer"; fi
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: app
        run: xcodegen generate

      - name: Import signing assets
        env:
          CERT_P12: ${{ secrets.BUILD_CERT_P12 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISION: ${{ secrets.BUILD_PROVISION }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/tapt.keychain-db"
          KPW=$(openssl rand -hex 12)
          security create-keychain -p "$KPW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPW" "$KEYCHAIN"
          echo "$CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -k "$KPW" "$KEYCHAIN" >/dev/null
          security list-keychain -d user -s "$KEYCHAIN"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$PROVISION" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/tapt.mobileprovision"
          echo "--- available signing identities ---"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Write ASC API key
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.ASC_KEY_P8 }}" | base64 --decode > ~/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - name: Resolve Swift packages
        working-directory: app
        run: xcodebuild -resolvePackageDependencies -project Tapt.xcodeproj -scheme Tapt

      - name: Archive (manual signing)
        working-directory: app
        run: |
          xcodebuild archive \
            -project Tapt.xcodeproj \
            -scheme Tapt \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/Tapt.xcarchive" \
            -skipMacroValidation \
            CURRENT_PROJECT_VERSION=${{ github.run_number }}

      - name: Export and upload to TestFlight
        id: upload
        working-directory: app
        run: |
          echo "uploaded=false" >> "$GITHUB_OUTPUT"
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>destination</key><string>upload</string>
            <key>teamID</key><string>J9DMDH4S58</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key>
            <dict><key>${BUNDLE_ID}</key><string>${PROFILE_NAME}</string></dict>
          </dict>
          </plist>
          PLIST
          set -o pipefail
          if xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Tapt.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }} 2>&1 | tee "$RUNNER_TEMP/upload.log"; then
            echo "Uploaded to TestFlight."
            echo "uploaded=true" >> "$GITHUB_OUTPUT"
          else
            # Apple caps uploads per app per day. Hitting that cap is expected after
            # several uploads in a day and is NOT a build failure, so end neutrally
            # (green, no failure email) instead of spamming a red run. Real export/
            # signing/validation failures still fall through and fail loudly.
            if grep -q "Upload limit reached" "$RUNNER_TEMP/upload.log"; then
              echo "::warning title=TestFlight upload skipped::Apple's daily upload limit was reached. Try again tomorrow. Not a build failure."
              echo "### TestFlight upload skipped" >> "$GITHUB_STEP_SUMMARY"
              echo "Apple's daily upload cap was reached. Try again tomorrow. This is **not** a build failure." >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            echo "::error title=TestFlight upload failed::Export/upload failed. See the log above."
            exit 1
          fi

  asc-admin:
    needs: build
    if: needs.build.outputs.uploaded == 'true'
    uses: ./.github/workflows/asc-admin.yml
    with:
      build_number: ${{ needs.build.outputs.build_number }}
      wait_for_processing: true
    secrets: inherit
