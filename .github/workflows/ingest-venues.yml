name: Ingest Beer Places

on:
  workflow_dispatch:
    inputs:
      release:
        description: Overture release (latest or YYYY-MM-DD.0)
        required: true
        default: latest
        type: string
      max_rows:
        description: Maximum globally balanced venue rows
        required: true
        default: "120000"
        type: string
      confidence:
        description: Minimum Overture confidence
        required: true
        default: "0.86"
        type: string
      dry_run:
        description: Query and audit only; do not write Supabase
        required: true
        default: true
        type: boolean
  schedule:
    - cron: "24 7 20 * *"

permissions:
  contents: read

concurrency:
  group: tapt-overture-venue-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install query runtime
        run: >-
          python -m pip install --disable-pip-version-check
          duckdb==1.4.3 h3==4.3.1 pycountry==24.6.1

      - name: Query, validate, and ingest beer places
        env:
          SUPABASE_URL: https://qfwiizvqxrhjlthbjosz.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OVERTURE_RELEASE: ${{ github.event.inputs.release || 'latest' }}
          MAX_ROWS: ${{ github.event.inputs.max_rows || '120000' }}
          MIN_CONFIDENCE: ${{ github.event.inputs.confidence || '0.86' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}
        run: |
          args=(
            --release "$OVERTURE_RELEASE"
            --max-rows "$MAX_ROWS"
            --confidence "$MIN_CONFIDENCE"
          )
          if [[ "$DRY_RUN" == "true" ]]; then args+=(--dry-run); fi
          python scripts/ingest_overture_venues.py "${args[@]}"
