name: Ingest beers (Open Food Facts)

# Grows the beer catalog from Open Food Facts (ODbL) a chunk at a time, on a
# schedule. Idempotent (dedup by barcode), resumable (the page cursor is
# committed back), and free (public repo = unlimited Actions minutes).
#
# One owner action to enable: add the repo secret SUPABASE_SERVICE_ROLE_KEY
# (Supabase dashboard -> Project Settings -> API -> service_role key).

on:
  schedule:
    - cron: "17 6 * * 1"   # Mondays 06:17 UTC
  workflow_dispatch:
    inputs:
      max_pages:
        description: "Pages to ingest this run (100 beers/page)"
        required: false
        default: "25"

permissions:
  contents: write

concurrency:
  group: ingest-beers
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Ingest a chunk of the OFF beers catalog
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MAX_PAGES: ${{ github.event.inputs.max_pages || '25' }}
          PAGE_SIZE: "100"
        run: |
          # This is a best-effort weekly content refresh. Neither a missing secret
          # (feature simply not enabled) nor a transient Open Food Facts outage is a
          # real failure, so skip neutrally (green, no failure email) in those cases.
          # The page cursor is resumable, so the next run picks up where this left off.
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::warning title=Ingestion skipped::SUPABASE_SERVICE_ROLE_KEY secret is not set — add it to enable the weekly catalog refresh. Skipping (not a failure)."
            echo "### ⏭️ Ingestion skipped — service-role secret not set (add it to enable)." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if ! python3 scripts/ingest_off_beers.py; then
            echo "::warning title=Ingestion incomplete::Open Food Facts ingestion did not finish (likely OFF API throttling). The cursor resumes next run — not a build failure."
            echo "### ⏭️ Ingestion incomplete — OFF likely throttling; resumes next run." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

      - name: Persist the page cursor
        if: always()
        run: |
          if [ -n "$(git status --porcelain scripts/.off_ingest_state.json)" ]; then
            git config user.name  "tapt-ingest-bot"
            git config user.email "esdronski@gmail.com"
            git add scripts/.off_ingest_state.json
            git commit -m "chore: advance OFF ingest cursor [skip ci]"
            git push
          else
            echo "cursor unchanged"
          fi
