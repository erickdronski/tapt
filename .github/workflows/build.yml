name: Build

# Compile-verify pushes that touch app code (simulator build, no signing, no
# upload). TestFlight delivery stays in testflight.yml (manual dispatch).
# COST: this runs on a macOS runner (bills ~10x Linux, ~110 billed min/push),
# so it path-filters to app sources, cancels superseded runs, and hard-caps
# runtime — an uncapped hang would bill the 360-min default at 10x.
on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'app/**'
      - '.github/workflows/build.yml'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST" ]; then sudo xcode-select -s "$LATEST/Contents/Developer"; fi
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: app
        run: xcodegen generate

      - name: Build (iOS Simulator, unsigned)
        working-directory: app
        run: |
          if ! xcodebuild build \
            -project Tapt.xcodeproj \
            -scheme Tapt \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" \
            > "$RUNNER_TEMP/xcodebuild.log" 2>&1; then
            echo "---- compile errors ----"
            grep -E "error:" "$RUNNER_TEMP/xcodebuild.log" | head -30
            echo "---- log tail ----"
            tail -40 "$RUNNER_TEMP/xcodebuild.log"
            exit 1
          fi
          tail -25 "$RUNNER_TEMP/xcodebuild.log"
