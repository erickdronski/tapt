name: Build

# Compile-verify pushes that touch app code (simulator build, no signing, no
# upload). TestFlight delivery stays in testflight.yml (manual dispatch).
# COST: this runs on a macOS runner (bills ~10x Linux, ~110 billed min/push),
# so it path-filters to app sources, cancels superseded runs, and hard-caps
# runtime — an uncapped hang would bill the 360-min default at 10x.
on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'app/**'
      - '.github/workflows/build.yml'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Select newest Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST" ]; then sudo xcode-select -s "$LATEST/Contents/Developer"; fi
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: app
        run: xcodegen generate

      - name: Build (iOS Simulator, unsigned)
        working-directory: app
        run: |
          if ! xcodebuild build \
            -project Tapt.xcodeproj \
            -scheme Tapt \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" \
            > "$RUNNER_TEMP/xcodebuild.log" 2>&1; then
            echo "---- compile errors ----"
            grep -E "error:" "$RUNNER_TEMP/xcodebuild.log" | head -30
            echo "---- log tail ----"
            tail -40 "$RUNNER_TEMP/xcodebuild.log"
            exit 1
          fi
          tail -25 "$RUNNER_TEMP/xcodebuild.log"

      - name: Verify Swift package lock
        run: git diff --exit-code -- app/Tapt.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved

      - name: Test (iOS Simulator)
        working-directory: app
        run: |
          DEVICE_TYPE=$(xcrun simctl list devicetypes -j | python3 -c '
          import json, sys
          items=json.load(sys.stdin)["devicetypes"]
          preferred=("iPhone 17 Pro", "iPhone 16 Pro", "iPhone 15 Pro")
          match=next((d for name in preferred for d in items if d["name"] == name), None)
          if not match: match=next((d for d in items if d["name"].startswith("iPhone")), None)
          if not match: raise SystemExit("No supported iPhone simulator device type")
          print(match["identifier"])
          ')
          RUNTIME=$(xcrun simctl list runtimes -j | python3 -c '
          import json, sys
          items=[r for r in json.load(sys.stdin)["runtimes"] if r.get("isAvailable") and r["identifier"].startswith("com.apple.CoreSimulator.SimRuntime.iOS-")]
          if not items: raise SystemExit("No available iOS simulator runtime")
          items.sort(key=lambda r: tuple(int(x) for x in r["version"].split(".")), reverse=True)
          print(items[0]["identifier"])
          ')
          UDID=$(xcrun simctl create "Tapt Tests" "$DEVICE_TYPE" "$RUNTIME")
          trap 'xcrun simctl shutdown "$UDID" >/dev/null 2>&1 || true; xcrun simctl delete "$UDID" >/dev/null 2>&1 || true' EXIT
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b

          if ! xcodebuild test \
            -project Tapt.xcodeproj \
            -scheme Tapt \
            -destination "platform=iOS Simulator,id=$UDID" \
            -parallel-testing-enabled NO \
            CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" \
            > "$RUNNER_TEMP/xctest.log" 2>&1; then
            echo "---- test errors ----"
            grep -E "error:|failed|FAIL" "$RUNNER_TEMP/xctest.log" | head -40
            echo "---- log tail ----"
            tail -50 "$RUNNER_TEMP/xctest.log"
            exit 1
          fi
          tail -30 "$RUNNER_TEMP/xctest.log"
