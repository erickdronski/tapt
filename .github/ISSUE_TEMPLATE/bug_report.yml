name: Bug report
description: Report a reproducible problem in Tapt.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, private user data, or vulnerability details. Use SECURITY.md for security reports.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the observed behavior and what you expected.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest reliable sequence of steps.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: App version, iOS version, device, or browser
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Add sanitized logs, screenshots, or recordings when useful.
